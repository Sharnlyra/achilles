name: SCANOSS CLI → Dependency-Track

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom-scan:
    runs-on: self-hosted

    env:
      SCANOSS_API_KEY: ${{ secrets.SCANOSS_API_KEY }}
      DT_URL: ${{ secrets.DT_URL }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}

      PROJECT_NAME: Lyra
      PROJECT_VERSION: "1.0"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCANOSS CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install scanoss

      - name: Verify Installation
        run: |
          python --version
          pip --version
          which scanoss-py || true
          scanoss-py --version || true
          scanoss-py --help || true

      ##############################################################
      # Configure SCANOSS
      ##############################################################

      - name: Configure API Key
        run: |
          mkdir -p ~/.config/scanoss

          cat > ~/.config/scanoss/config.json <<EOF
          {
            "api_key":"${SCANOSS_API_KEY}"
          }
          EOF

          echo "Configuration created."

      ##############################################################
      # Generate CycloneDX SBOM
      ##############################################################

      - name: Generate SBOM
        run: |
          mkdir -p output

          # Replace this command if your installed version differs
          scanoss-py scan . \
            --format cyclonedx \
            --output output/bom.json

      - name: Verify SBOM
        run: |
          ls -lh output
          test -f output/bom.json

      ##############################################################
      # Upload to Dependency-Track
      ##############################################################

      - name: Upload BOM
        run: |
          curl -X POST \
            "${DT_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DT_API_KEY}" \
            -F "autoCreate=true" \
            -F "projectName=${PROJECT_NAME}" \
            -F "projectVersion=${PROJECT_VERSION}" \
            -F "bom=@output/bom.json"

      ##############################################################
      # Upload Artifact
      ##############################################################

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: output/bom.json
