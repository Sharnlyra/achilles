jobs:
  scanoss-code-scan:
    name: SCANOSS Code Scan
    runs-on: self-hosted

    outputs:
      result-filepath: ${{ steps.scanoss-code-scan-step.outputs.result-filepath }}
      stdout-scan-command: ${{ steps.scanoss-code-scan-step.outputs.stdout-scan-command }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Debug networking
        run: |
          echo "Hostname:"
          hostname

          echo "Runner IP:"
          hostname -I

          echo "Testing Dependency-Track..."
          curl -v http://localhost:8080/api/version

          echo "Docker containers:"
          docker ps || true

      - name: Run SCANOSS Code Scan
        id: scanoss-code-scan-step
        uses: scanoss/gha-code-scan@v1
        with:
          dependencies.enabled: true
          policies: copyleft, undeclared, dt
          policies.halt_on_failure: false
          deptrack.upload: true
          deptrack.url: ${{ vars.DT_URL }}
          deptrack.apikey: ${{ secrets.DT_API_KEY }}
          deptrack.projectname: ${{ github.event.repository.name }}
          deptrack.projectversion: ${{ github.ref_name }}

      - name: Save scan command output to file
        env:
          STDOUT_CONTENT: ${{ steps.scanoss-code-scan-step.outputs.stdout-scan-command }}
        run: printf '%s\n' "$STDOUT_CONTENT" > scanoss-stdout.txt

      - name: Upload raw SCANOSS results
        uses: actions/upload-artifact@v4
        with:
          name: scanoss-raw-results
          path: |
            ${{ steps.scanoss-code-scan-step.outputs.result-filepath }}
            scanoss-stdout.txt
          retention-days: 14
