name: SCANOSS → Dependency-Track

on:
  push:
    branches:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-and-upload:
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify Dependency-Track
        run: |
          docker run --rm curlimages/curl \
            ${{ secrets.DT_URL }}/api/version

      - name: Run SCANOSS Scan
        id: scanoss
        uses: scanoss/gha-code-scan@v1
        with:
          dependencies.enabled: true
          policies: copyleft,undeclared
          policies.halt_on_failure: false

      - name: Verify CycloneDX SBOM
        run: |
          echo "Searching for CycloneDX SBOM..."
          find . -type f \( -name "*.json" -o -name "*.cdx.json" -o -name "bom*" \)

      - name: Upload CycloneDX SBOM to Dependency-Track
        run: |
          curl -X POST "${{ secrets.DT_URL }}/api/v1/bom" \
            -H "X-Api-Key: ${{ secrets.DT_API_KEY }}" \
            -F "projectName=Lyra" \
            -F "projectVersion=1.0" \
            -F "autoCreate=true" \
            -F "bom=@bom.json"

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: bom.json
