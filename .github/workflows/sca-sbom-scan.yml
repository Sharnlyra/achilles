name: SCANOSS SBOM to Dependency-Track

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scanoss:
    runs-on: self-hosted

    env:
      SCANOSS_API_KEY: ${{ secrets.SCANOSS_API_KEY }}
      DT_URL: ${{ secrets.DT_URL }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      PROJECT_NAME: Lyra
      PROJECT_VERSION: "1.0"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCANOSS CLI
        run: |
          python -m pip install --upgrade pip
          pip install scanoss-py

      - name: Verify Installation
        run: |
          scanoss-py --version

      - name: Configure SCANOSS API Key
        run: |
          mkdir -p ~/.config/scanoss
          cat > ~/.config/scanoss/config.json <<EOF
          {
            "api_key": "${SCANOSS_API_KEY}"
          }
          EOF

      - name: Generate CycloneDX SBOM
        run: |
          scanoss-py scan \
            . \
            --format cyclonedx \
            --output sbom.json

      - name: Verify SBOM
        run: |
          ls -lh sbom.json
          head -20 sbom.json

      - name: Upload SBOM to Dependency-Track
        run: |
          curl -X POST "${DT_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DT_API_KEY}" \
            -F "autoCreate=true" \
            -F "projectName=${PROJECT_NAME}" \
            -F "projectVersion=${PROJECT_VERSION}" \
            -F "bom=@sbom.json"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: sbom.json
